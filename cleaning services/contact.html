<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Sparkling Homes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="logo">Sparkling Homes</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="prices.html">Prices</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>
  <div class="menu" onclick="toggleMenu()">☰</div>
</header>

<!-- CONTACT SECTION -->
<section class="contact-section">
  <div class="contact-container">

    <!-- LEFT -->
    <div class="contact-left reveal fade-left">
      <span class="section-line"></span>
      <h1>CONTACT</h1>

      <p>
        Ready to experience a sparkling clean home? Get in touch with us today
        to schedule your home cleanliness service, request a free quote, or
        learn more about our tailored cleaning solutions.
      </p>

      <form id="contact-form">
        <label>Full name:</label>
        <input type="text" placeholder="John Smith" required />

        <label>Your e-mail:</label>
        <input type="email" placeholder="address@email.com" required />

        <label>Message:</label>
        <textarea placeholder="Enter your message here" required></textarea>

        <button type="submit" class="btn">Send Message</button>
      </form>
    </div>

    <!-- RIGHT -->
    <div class="contact-right reveal fade-right">
      <img
        src="https://plus.unsplash.com/premium_photo-1661766884446-83c79ca4b514?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8Y29udGFjdCUyMHN1cHBvcnR8ZW58MHx8MHx8fDA%3D"
        alt="Cleaning service"
      />
    </div>

  </div>
</section>
<!-- MAP SECTION -->
<section class="map-section">
  <div class="map-container">
    <iframe
      src="https://www.google.com/maps?q=Islamabad,Pakistan&output=embed"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>
</section>


<footer>
  © 2026 Sparkling Homes. All rights reserved.
</footer>

<script src="script.js"></script>
</body>
</html>
